services:
  - type: web
    name: bhumi-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: GATEWAY_PORT
        sync: false
      - key: AI_SERVICE_URL
        value: http://127.0.0.1:8001
      - key: DATA_SERVICE_URL
        value: http://127.0.0.1:8002
      - key: ALERTS_SERVICE_URL
        value: http://127.0.0.1:8003
      - key: SCHEDULER_SERVICE_PORT
        value: 8004
      - key: AI_SERVICE_PORT
        value: 8001
      - key: DATA_SERVICE_PORT
        value: 8002
      - key: ALERTS_SERVICE_PORT
        value: 8003
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: BASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_STT_MODEL_ID
        value: scribe_v1
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DATA_STORE_MODE
        value: mongo
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: eldermind
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
      - key: META_WHATSAPP_TOKEN
        sync: false
      - key: META_WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: APP_ENV
        value: production
      - key: MEDIA_DIR
        value: /tmp/backend_media
    healthCheckPath: /health
